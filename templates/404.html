<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 - Smart Commute Planner</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    background:linear-gradient(135deg,#eaf7ff,#f5fcff);
}

.card{
    width:100%;
    max-width:650px;
    background:white;
    border-radius:24px;
    padding:55px 40px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.logo{
    width:80px;
    height:80px;
    margin:auto;
    margin-bottom:25px;
    border-radius:20px;
    background:linear-gradient(135deg,#0ea5e9,#2563eb);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:38px;
    color:white;
}

.error-code{
    font-size:110px;
    font-weight:bold;
    color:#0f172a;
    line-height:1;
}

h1{
    margin-top:18px;
    font-size:38px;
    color:#1e293b;
}

p{
    margin-top:18px;
    color:#64748b;
    font-size:18px;
    line-height:1.6;
}

.btn{
    display:inline-block;
    margin-top:35px;
    padding:15px 30px;
    border-radius:12px;
    background:linear-gradient(135deg,#0ea5e9,#2563eb);
    color:white;
    text-decoration:none;
    font-size:17px;
    font-weight:bold;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(37,99,235,.3);
}

@media(max-width:600px){

.card{
    padding:40px 25px;
}

.error-code{
    font-size:80px;
}

h1{
    font-size:30px;
}

p{
    font-size:16px;
}

}

</style>

</head>

<body>

<div class="card">

    <div class="logo">
        🚗
    </div>

    <div class="error-code">
        404
    </div>

    <h1>
        {{ title }}
    </h1>

    <p>
        {{ message }}
    </p>

    <a href="{{ url_for('home') }}" class="btn">
        🏠 Back to Home
    </a>

</div>

</body>

</html>
